<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdShriek — Threat Detection Platform Architecture</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-deep: #06080d;
      --bg-surface: #0b0f18;
      --bg-card: #0e1320;
      --border-dim: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --text-primary: #e8ecf4;
      --text-secondary: #7a8599;
      --text-dim: #3d4a5e;
      --blue: #00b4ff;
      --blue-glow: rgba(0, 180, 255, 0.15);
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.15);
      --amber: #f59e0b;
      --amber-glow: rgba(245, 158, 11, 0.12);
      --red: #f43f5e;
      --red-glow: rgba(244, 63, 94, 0.12);
      --green: #22d3ee;
      --green-glow: rgba(34, 211, 238, 0.12);
      --emerald: #10b981;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── Header ─── */
    .header {
      padding: 28px 40px 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-dim);
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 40px;
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, var(--red), transparent);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .logo h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 26px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--red), #ff6b6b, var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--border-subtle);
      border-radius: 3px;
    }

    .header-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      text-align: right;
      line-height: 1.7;
    }

    /* ─── View Toggle ─── */
    .toggle-wrap {
      display: flex;
      justify-content: center;
      padding: 20px 40px 12px;
    }

    .toggle-bar {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .toggle-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 8px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: transparent;
      color: var(--text-secondary);
    }

    .toggle-btn.active {
      background: rgba(244, 63, 94, 0.12);
      color: var(--red);
      box-shadow: 0 0 20px rgba(244, 63, 94, 0.08);
    }

    .toggle-btn:hover:not(.active) {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.03);
    }

    /* ─── Canvas container ─── */
    .canvas-wrap {
      padding: 16px 40px;
      position: relative;
    }

    #flowCanvas,
    #sysCanvas {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border-dim);
      background: var(--bg-surface);
    }

    .hidden {
      display: none !important;
    }

    /* ─── Latency Spectrum ─── */
    .latency-panel {
      padding: 16px 40px 8px;
    }

    .latency-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .latency-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-dim);
    }

    .spectrum-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      position: relative;
    }

    .spectrum-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 6px;
      position: relative;
    }

    .spectrum-col.c-p10 {
      flex: 1;
    }

    .spectrum-col.c-p50 {
      flex: 2;
    }

    .spectrum-col.c-p99 {
      flex: 3;
    }

    .sp-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .sp-value {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .sp-unit {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      font-weight: 400;
    }

    .sp-bar-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      height: 18px;
      margin: 6px 0 4px;
      position: relative;
    }

    .sp-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
    }

    .sp-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .sp-desc {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.3;
    }

    /* SLO marker */
    .sp-slo {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
    }

    .sp-slo-line {
      width: 1px;
      flex: 1;
      border-left: 1.5px dashed rgba(255, 255, 255, 0.15);
    }

    .sp-slo-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px;
      color: var(--text-dim);
      white-space: nowrap;
      padding: 2px 4px;
      background: var(--bg-card);
      border-radius: 2px;
      border: 1px solid var(--border-dim);
    }

    /* Colors */
    .c-p10 .sp-label,
    .c-p10 .sp-value {
      color: #22d3ee;
    }

    .c-p10 .sp-dot {
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
    }

    .c-p10 .sp-bar {
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.4), rgba(34, 211, 238, 0.15));
    }

    .c-p50 .sp-label,
    .c-p50 .sp-value {
      color: #00b4ff;
    }

    .c-p50 .sp-dot {
      background: #00b4ff;
      box-shadow: 0 0 8px rgba(0, 180, 255, 0.5);
    }

    .c-p50 .sp-bar {
      background: linear-gradient(90deg, rgba(0, 180, 255, 0.3), rgba(0, 180, 255, 0.1));
    }

    .c-p99 .sp-label,
    .c-p99 .sp-value {
      color: #f59e0b;
    }

    .c-p99 .sp-dot {
      background: #f59e0b;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
    }

    .c-p99 .sp-bar {
      background: linear-gradient(90deg, rgba(245, 158, 11, 0.25), rgba(245, 158, 11, 0.08));
    }

    @media (max-width: 900px) {
      .header {
        padding: 20px;
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }

      .canvas-wrap,
      .latency-panel,
      .legend-bar {
        padding-left: 16px;
        padding-right: 16px;
      }

      .sp-value {
        font-size: 15px;
      }

      .sp-desc {
        display: none;
      }

      .spectrum-col {
        padding: 0 3px;
      }
    }

    /* ─── Detail modal ─── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(6, 8, 13, 0.75);
      backdrop-filter: blur(6px);
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 500px;
      width: 90%;
      transform: translateY(10px);
      transition: transform 0.25s;
    }

    .modal-overlay.open .modal-box {
      transform: translateY(0);
    }

    .modal-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-layer {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .modal-row {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-dim);
    }

    .modal-row:last-child {
      border-bottom: none;
    }

    .modal-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      font-weight: 600;
      min-width: 110px;
      flex-shrink: 0;
    }

    .modal-val {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    /* ─── Legend bar ─── */
    .legend-bar {
      padding: 0 40px 8px;
      display: flex;
      gap: 28px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }

    .legend-swatch {
      width: 18px;
      height: 3px;
      border-radius: 2px;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    @media (max-width: 900px) {
      .header {
        padding: 20px;
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }

      .canvas-wrap,
      .latency-panel,
      .legend-bar {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">
      <h1>CrowdShriek</h1>
      <span class="tag">architecture v0.1</span>
    </div>
    <div class="header-meta">
      Real-Time Threat Detection Platform<br>
      Sub-second · 3 PB/day · Knowledge Graph Enriched
    </div>
  </div>

  <div class="latency-panel">
    <div class="latency-title">Latency Distribution</div>
    <div class="spectrum-row">
      <!-- P10 -->
      <div class="spectrum-col c-p10">
        <div class="sp-label">P10</div>
        <div class="sp-value">80–120 <span class="sp-unit">ms</span></div>
        <div class="sp-bar-wrap">
          <div class="sp-bar"></div>
          <div class="sp-dot"></div>
        </div>
        <div class="sp-desc">Structured → fast parse → Tier 1</div>
      </div>
      <!-- P50 -->
      <div class="spectrum-col c-p50">
        <div class="sp-label">P50</div>
        <div class="sp-value">250–400 <span class="sp-unit">ms</span></div>
        <div class="sp-bar-wrap">
          <div class="sp-bar"></div>
          <div class="sp-dot"></div>
        </div>
        <div class="sp-desc">Heuristic → enrich → Tiers 1-3</div>
      </div>
      <!-- P99 with SLO marker -->
      <div class="spectrum-col c-p99">
        <div class="sp-label">P99</div>
        <div class="sp-value">700–950 <span class="sp-unit">ms</span></div>
        <div class="sp-bar-wrap">
          <div class="sp-bar"></div>
          <div class="sp-dot"></div>
        </div>
        <div class="sp-desc">LLM → graph → all 4 tiers</div>
        <div class="sp-slo">
          <div class="sp-slo-tag">1s SLO</div>
          <div class="sp-slo-line"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toggle-wrap">
    <div class="toggle-bar">
      <button class="toggle-btn active" id="btnFlow" onclick="switchView('flow')">Data Flow</button>
      <button class="toggle-btn" id="btnSys" onclick="switchView('sys')">System Design</button>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="flowCanvas" width="1400" height="920"></canvas>
    <canvas id="sysCanvas" width="1400" height="920" class="hidden"></canvas>
  </div>

  <div class="modal-overlay" id="modal" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-layer" id="modalLayer"></div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // CONFIG & DATA
    // ═══════════════════════════════════════════════════════════
    const COLORS = {
      blue: '#00b4ff', purple: '#a855f7', amber: '#f59e0b',
      red: '#f43f5e', green: '#22d3ee', emerald: '#10b981',
      bgSurface: '#0b0f18', bgCard: '#0e1320',
      borderDim: 'rgba(255,255,255,0.04)', borderSubtle: 'rgba(255,255,255,0.08)',
      textPrimary: '#e8ecf4', textSecondary: '#7a8599', textDim: '#3d4a5e'
    };

    function glow(color, a = 0.15) { return 'rgba(' + parseInt(color.slice(1, 3), 16) + ',' + parseInt(color.slice(3, 5), 16) + ',' + parseInt(color.slice(5, 7), 16) + ',' + a + ')'; }

    const DETAIL = {
      structured: {
        title: 'Structured Event Sources', layer: 'INGESTION', color: COLORS.blue, rows: [
          ['Type', 'Known schemas · established event types'],
          ['Examples', 'EDR telemetry, firewall logs, auth events'],
          ['Volume', '~80% of total ingestion'],
          ['Format', 'Schema-registered, versioned via Confluent Schema Registry']
        ]
      },
      unstructured: {
        title: 'Unstructured Event Sources', layer: 'INGESTION', color: COLORS.blue, rows: [
          ['Type', 'Heterogeneous · multi-format'],
          ['Examples', 'Salesforce, ServiceNow, Atlassian, Slack, email'],
          ['Volume', '~20% of total ingestion'],
          ['Formats', 'JSON, XML, free text, mixed payloads']
        ]
      },
      kafka: {
        title: 'Apache Kafka', layer: 'INGESTION', color: COLORS.blue, rows: [
          ['Role', 'Landing topic for all accepted events'],
          ['Throughput', '~35 GB/s sustained'],
          ['Partitioning', 'By customer_id for ordering & locality'],
          ['Routing', 'Multi-cluster deployment (regional details omitted)'],
          ['Schema Registry', 'Enforced for structured events']
        ]
      },
      receiver: {
        title: 'Receiver Server', layer: 'INGESTION', color: COLORS.blue, rows: [
          ['Role', 'Smart front-door for all incoming events'],
          ['Authentication', 'mTLS + API key validation per source'],
          ['Rate limiting', 'Per-tenant token-bucket with burst allowance'],
          ['Structured', 'Schema check via registry'],
          ['Unstructured', 'Accept raw payload + source metadata tags'],
          ['Persistence', 'Writes accepted events to Kafka landing topic'],
          ['Rejection', 'Malformed / unauthorized events dropped with metrics']
        ]
      },
      deterministic: {
        title: 'Deterministic Parsers', layer: 'NORMALIZATION', color: COLORS.purple, rows: [
          ['Traffic', '~80% of all events'],
          ['Latency', '< 1ms'],
          ['Method', 'Schema mapping → normalized event envelope'],
          ['Use when', 'Known integration with stable schema'],
          ['Output', 'High-confidence normalized envelope']
        ]
      },
      heuristic: {
        title: 'Regex + Heuristic Extractors', layer: 'NORMALIZATION', color: COLORS.purple, rows: [
          ['Traffic', '~10-12% of events'],
          ['Latency', '< 5ms'],
          ['Method', 'Field-name matching, structural analysis'],
          ['Use when', 'Semi-structured, recognizable patterns'],
          ['Output', 'Medium-confidence normalized envelope']
        ]
      },
      prefilter: {
        title: 'Pre-Filter (Bloom + Fast NLP)', layer: 'NORMALIZATION', color: COLORS.purple, rows: [
          ['Problem', '~7 GB/s unstructured = ~7M msgs/sec — too much for LLM'],
          ['Stage 1', 'Bloom filter check against threat intel IOCs (< 0.1ms)'],
          ['Stage 2', 'Lightweight NLP classifier — intent/risk scoring (< 1ms)'],
          ['Pass rate', 'Small fraction of unstructured events need full LLM parse'],
          ['Drop', 'Safe/routine events get fast-path partial normalization'],
          ['Result', 'Reduces LLM load by an order of magnitude']
        ]
      },
      llm: {
        title: 'Distilled LLM (1-3B params)', layer: 'NORMALIZATION', color: COLORS.purple, rows: [
          ['Traffic', 'Filtered unstructured events (post pre-filter)'],
          ['Latency', '< 30ms (1-3B params, quantized)'],
          ['Method', 'Semantic extraction for free-text payloads'],
          ['Use when', 'Pre-filter flags as needing deep semantic parse'],
          ['Serving', 'Batched inference · optimized for low latency'],
          ['Confidence routing', 'High → fast path · Low → async re-analysis']
        ]
      },
      hotgraph: {
        title: 'Hot Graph — Memgraph', layer: 'ENRICHMENT', color: COLORS.amber, rows: [
          ['Technology', 'Memgraph — in-memory graph for hot window'],
          ['Latency', '~10-30ms for 1-2 hop traversal'],
          ['Scope', 'Last 24-72h of entity state per tenant'],
          ['Sharding', 'By customer_id · 3x replicated'],
          ['Nodes', 'Users, Devices, IPs, Domains, Files, Roles'],
          ['Edges', 'OWNS, HAS_ROLE, CONNECTS_TO, FROM, MEMBER_OF'],
          ['Updates', 'Micro-batched writes from stream'],
          ['Query language', 'Cypher (compatible with Neo4j)']
        ]
      },
      warmgraph: {
        title: 'Warm Graph — Neo4j', layer: 'ENRICHMENT', color: COLORS.amber, rows: [
          ['Technology', 'Neo4j — disk-based with page cache'],
          ['Scope', 'Full historical entity graph'],
          ['Deployment', 'Causal clustering + read replicas'],
          ['Sharding', 'By customer_id via Neo4j Fabric'],
          ['Updates', 'Micro-batched writes from stream'],
          ['Use', 'Deep investigations, async enrichment'],
          ['Query language', 'Cypher (same as Memgraph — one language across tiers)']
        ]
      },
      tier1: {
        title: 'Tier 1: Rule-Based / Signature', layer: 'DETECTION', color: COLORS.red, rows: [
          ['Latency', 'Microseconds'],
          ['Method', 'Stateless pattern matching'],
          ['Examples', 'Known phishing domains, blocklisted IPs'],
          ['Tech', 'Apache Flink stateless operators'],
          ['Catches', 'Known threats · high precision']
        ]
      },
      tier2: {
        title: 'Tier 2: Stateful CEP', layer: 'DETECTION', color: COLORS.red, rows: [
          ['Latency', 'Microseconds'],
          ['Method', 'Temporal event pattern matching'],
          ['Patterns', 'Golden labels + synthetic pattern generation'],
          ['Example', 'Email → click → download within 90s window'],
          ['Tech', 'Apache Flink CEP · event-time processing'],
          ['State', 'Keyed by customer_id + entity_id']
        ]
      },
      tier3: {
        title: 'Tier 3: ML / Anomaly', layer: 'DETECTION', color: COLORS.red, rows: [
          ['Latency', '~10ms inference'],
          ['Method', 'Deviation from per-entity baselines'],
          ['Models', 'Specialist small models for composability'],
          ['Training', 'Offline on last 30-90 days of activity'],
          ['Baseline', 'Compact feature vector stored in Redis'],
          ['Serving', 'GPU inference (ONNX/TensorRT) · CPU fallback'],
          ['Example', 'User never downloads .exe → first .exe flagged'],
          ['Features', 'Derived from history + graph context']
        ]
      },
      tier4: {
        title: 'Tier 4: Graph-Based Detection', layer: 'DETECTION', color: COLORS.red, rows: [
          ['Latency', '~10-30ms'],
          ['Method', 'Structural anomalies in entity relationships'],
          ['Realtime', 'Incremental/dynamic subgraph updates'],
          ['Async', 'Full-graph analytics on minute+ cadence'],
          ['Example', 'New path to sensitive resource · coordinated clicks'],
          ['Catches', 'Lateral movement, coordinated attacks']
        ]
      },
      fusion: {
        title: 'Signal Fusion Layer', layer: 'DETECTION', color: COLORS.red, rows: [
          ['Method', 'Weighted scoring / small ML model'],
          ['Input', 'Scored signals from all 4 detection tiers'],
          ['Output', 'Final threat decision + score'],
          ['Threshold', 'Configurable per customer'],
          ['Key concern', '0.01% FP at scale = millions of false alerts/day']
        ]
      },
      action: {
        title: 'Action Queue', layer: 'ACTION', color: COLORS.emerald, rows: [
          ['Input', 'Threats above fusion threshold'],
          ['Outputs', 'Block, quarantine, revoke session, alert SOC'],
          ['Scope', 'Outside this system\'s design boundary']
        ]
      },
      cold: {
        title: 'Cold Storage', layer: 'ACTION', color: COLORS.emerald, rows: [
          ['Format', 'Parquet columnar on S3/GCS'],
          ['Contents', 'Threat detections + raw logs'],
          ['Purpose', 'Forensics, compliance, model retraining'],
          ['Volume', 'Full 3 PB/day raw events retained'],
          ['Retention', 'Per customer compliance requirements']
        ]
      },
      // System design nodes
      'sys-kafka': {

    // ═══════════════════════════════════════════════════════════
    // DRAWING UTILITIES
    // ═══════════════════════════════════════════════════════════
    function dpr(canvas) {
      const r = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * r;
      canvas.height = rect.height * r;
      const ctx = canvas.getContext('2d');
      ctx.scale(r, r);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      return ctx;
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke, strokeW = 1) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
    }

    function diamond(ctx, cx, cy, size, fill, stroke) {
      const h = size / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - h); ctx.lineTo(cx + h, cy); ctx.lineTo(cx, cy + h); ctx.lineTo(cx - h, cy); ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke(); }
    }

    function arrow(ctx, x1, y1, x2, y2, color, opts = {}) {
      const { dashed, thick, label, labelOffX = 0, labelOffY = 0 } = opts;
      const dx = x2 - x1, dy = y2 - y1, len = Math.sqrt(dx * dx + dy * dy);
      const ux = dx / len, uy = dy / len;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = thick ? 2 : 1.2;
      if (dashed) ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2 - ux * 6, y2 - uy * 6);
      ctx.stroke();
      ctx.setLineDash([]);
      // arrowhead
      const ax = x2 - ux * 8, ay = y2 - uy * 8;
      const px = -uy * 3.5, py = ux * 3.5;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(ax + px, ay + py);
      ctx.lineTo(ax - px, ay - py);
      ctx.closePath();
      ctx.fill();
      if (label) {
        const mx = (x1 + x2) / 2 + labelOffX, my = (y1 + y2) / 2 + labelOffY;
        ctx.font = '500 9px "IBM Plex Mono", monospace';
        ctx.fillStyle = COLORS.textSecondary;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // background
        const tw = ctx.measureText(label).width + 6;
        ctx.fillStyle = COLORS.bgSurface;
        ctx.fillRect(mx - tw / 2, my - 7, tw, 14);
        ctx.fillStyle = COLORS.textSecondary;
        ctx.fillText(label, mx, my);
      }
      ctx.restore();
    }

    function layerBand(ctx, y, h, color, title, subtitle, W) {
      ctx.fillStyle = glow(color, 0.04);
      ctx.fillRect(0, y, W, h);
      ctx.strokeStyle = glow(color, 0.15);
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      ctx.font = '700 10px "IBM Plex Mono", monospace';
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.fillText(title, 20, y + 18);
      ctx.font = '400 9px "Outfit", sans-serif';
      ctx.fillStyle = COLORS.textDim;
      ctx.fillText(subtitle, 20, y + 32);
    }

    // ═══════════════════════════════════════════════════════════
    // PARTICLE SYSTEM — with fan-out at event bus and fan-in at fusion
    // ═══════════════════════════════════════════════════════════

    // Simple particle that follows a path
    class Particle {
      constructor(path, color, speed, delay, trailLen) {
        this.path = path;
        this.color = color;
        this.speed = speed;
        this.delay = delay;
        this.t = -delay;
        this.segIdx = 0;
        this.segT = 0;
        this.alive = true;
        this.trail = [];
        this.trailLen = trailLen || 12;
        this.headSize = 6;
      }
      update(dt) {
        this.t += dt;
        if (this.t < 0) return;
        if (this.segIdx >= this.path.length - 1) { this.alive = false; return; }
        const a = this.path[this.segIdx], b = this.path[this.segIdx + 1];
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < 0.1) { this.segIdx++; return; }
        this.segT += (this.speed * dt) / len;
        if (this.segT >= 1) {
          this.segT = 0;
          this.segIdx++;
          if (this.segIdx >= this.path.length - 1) { this.alive = false; return; }
        }
        const sa = this.path[this.segIdx], sb = this.path[this.segIdx + 1];
        const cx = sa.x + (sb.x - sa.x) * this.segT;
        const cy = sa.y + (sb.y - sa.y) * this.segT;
        this.trail.push({ x: cx, y: cy });
        if (this.trail.length > this.trailLen) this.trail.shift();
      }
      draw(ctx) {
        if (this.t < 0 || !this.alive || this.trail.length === 0) return;
        for (let i = 0; i < this.trail.length; i++) {
          const p = this.trail[i];
          const a = (i / this.trail.length) * 0.6;
          const r = 1 + (i / this.trail.length) * 1.5;
          ctx.beginPath();
          ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
          ctx.fillStyle = this.color.replace(')', ',' + a + ')').replace('rgb', 'rgba');
          ctx.fill();
        }
        const h = this.trail[this.trail.length - 1];
        ctx.beginPath();
        ctx.arc(h.x, h.y, this.headSize, 0, Math.PI * 2);
        const g = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, this.headSize);
        g.addColorStop(0, this.color.replace(')', ',0.5)').replace('rgb', 'rgba'));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fill();
      }
    }

    // Cascading detection: event enters T1, escalates right if no match, all paths drop into fusion
    const TIER_CASCADE = [
      { enter: { x: 215, y: 554 }, exit: { x: 290, y: 554 }, score: { x: 215, y: 578 }, fusionPt: { x: 400, y: 610 } },
      { enter: { x: 330, y: 554 }, exit: { x: 480, y: 554 }, score: { x: 405, y: 578 }, fusionPt: { x: 450, y: 610 } },
      { enter: { x: 520, y: 554 }, exit: { x: 670, y: 554 }, score: { x: 595, y: 578 }, fusionPt: { x: 540, y: 610 } },
      { enter: { x: 710, y: 554 }, exit: { x: 860, y: 554 }, score: { x: 785, y: 578 }, fusionPt: { x: 620, y: 610 } },
    ];
    const FUSION_END = { x: 500, y: 635 };
    const ACTION_PATH = [{ x: 500, y: 658 }, { x: 500, y: 685 }, { x: 390, y: 735 }]; // Action queue path (thresholded threats)
    const COLD_PATH = [{ x: 500, y: 635 }, { x: 560, y: 658 }, { x: 680, y: 735 }]; // Cold storage path (all events)

    class CascadeGroup {
      constructor(prePath, color, speed, delay, stopTier) {
        this.color = color;
        this.speed = speed;
        this.stopTier = stopTier; // 0-3 = threat at tier N, 4 = no threat
        this.triggerAction = stopTier < 4;
        this.phase = 'pre';
        this.alive = true;
        this.main = new Particle(prePath, color, speed, delay);
        this.main.headSize = 5;
        // Cascade through tiers
        const pts = [];
        const maxT = Math.min(this.stopTier, 3);
        for (let i = 0; i <= maxT; i++) {
          pts.push(TIER_CASCADE[i].enter);
          pts.push(TIER_CASCADE[i].exit);
        }
        this.cascade = new Particle(pts, color, speed * 0.7, 0, 8);
        this.cascade.headSize = 4;
        // Score drop to fusion (all events)
        const scoreIdx = Math.min(this.stopTier, 3);
        const tc = TIER_CASCADE[scoreIdx];
        this.scoreDrop = new Particle([tc.score, tc.fusionPt, FUSION_END], color, speed * 0.8, 0, 6);
        this.scoreDrop.headSize = 4;
        this.actionDrop = this.triggerAction ? new Particle(ACTION_PATH, color, speed, 0, 6) : null;
        if (this.actionDrop) this.actionDrop.headSize = 4;
        this.coldDrop = new Particle(COLD_PATH, color, speed * 0.9, 0, 6);
        this.coldDrop.headSize = 4;
      }
      update(dt) {
        if (this.phase === 'done') { this.alive = false; return; }
        if (this.phase === 'pre') {
          this.main.update(dt);
          if (!this.main.alive) this.phase = 'cascade';
        }
        if (this.phase === 'cascade') {
          this.cascade.update(dt);
          if (!this.cascade.alive) {
            this.phase = 'score';
          }
        }
        if (this.phase === 'score') {
          this.scoreDrop.update(dt);
          if (!this.scoreDrop.alive) this.phase = 'post';
        }
        if (this.phase === 'post') {
          this.coldDrop.update(dt);
          if (this.actionDrop) this.actionDrop.update(dt);
          if (!this.coldDrop.alive && (!this.actionDrop || !this.actionDrop.alive)) this.phase = 'done';
        }
      }
      draw(ctx) {
        if (this.phase === 'pre') this.main.draw(ctx);
        if (this.phase === 'cascade') this.cascade.draw(ctx);
        if (this.phase === 'score') this.scoreDrop.draw(ctx);
        if (this.phase === 'post') {
          if (this.coldDrop) this.coldDrop.draw(ctx);
          if (this.actionDrop) this.actionDrop.draw(ctx);
        }
      }
    }

    // Weighted: half of events are threats, remaining are benign
    // T1: 25%, T2: 12.5%, T3: 7.5%, T4: 5%, no threat: 50%
    function pickStopTier() {
      const r = Math.random();
      if (r < 0.25) return 0;
      if (r < 0.375) return 1;
      if (r < 0.45) return 2;
      if (r < 0.50) return 3;
      return 4;
    }

    let particles = [];
    let lastTime = 0;

    function spawnGroup(p, pi, delay) {
      const speed = 180 + pi * 20;
      const stopTier = pickStopTier();
      particles.push(new CascadeGroup(p.pre, p.color, speed, delay, stopTier));
    }

    function spawnParticles() {
      FLOW_PATHS.forEach((p, pi) => {
        spawnGroup(p, pi, pi * 2.0);
        spawnGroup(p, pi + FLOW_PATHS.length, pi * 2.0 + 0.6);
      });
    }

    function respawnLoop() {
      setInterval(() => {
        FLOW_PATHS.forEach((p, pi) => {
          spawnGroup(p, pi, pi * 0.8);
          spawnGroup(p, pi + FLOW_PATHS.length, pi * 0.8 + 0.4);
        });
        particles = particles.filter(p => p.alive);
      }, 6000);
    }

    // ── Shape primitives for system design ──

    function drawCylinder(ctx, x, y, w, h, color, fillColor) {
      // Database cylinder shape
      const ew = w, eh = 14; // ellipse dimensions for top/bottom caps
      const bodyTop = y + eh / 2;
      const bodyBot = y + h - eh / 2;
      // body
      ctx.fillStyle = fillColor || glow(color, 0.06);
      ctx.beginPath();
      ctx.moveTo(x, bodyTop);
      ctx.lineTo(x, bodyBot);
      ctx.ellipse(x + ew / 2, bodyBot, ew / 2, eh / 2, 0, Math.PI, 0, true);
      ctx.lineTo(x + ew, bodyTop);
      ctx.ellipse(x + ew / 2, bodyTop, ew / 2, eh / 2, 0, 0, Math.PI, true);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = glow(color, 0.4);
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // bottom ellipse line
      ctx.beginPath();
      ctx.ellipse(x + ew / 2, bodyBot, ew / 2, eh / 2, 0, 0, Math.PI * 2);
      ctx.strokeStyle = glow(color, 0.15);
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // top ellipse filled
      ctx.beginPath();
      ctx.ellipse(x + ew / 2, bodyTop, ew / 2, eh / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = glow(color, 0.12);
      ctx.fill();
      ctx.strokeStyle = glow(color, 0.4);
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function drawPipe(ctx, x, y, w, h, color) {
      // Horizontal tube/pipe for streaming
      const r = h / 2;
      ctx.fillStyle = glow(color, 0.06);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arc(x + w - r, y + r, r, -Math.PI / 2, Math.PI / 2);
      ctx.lineTo(x + r, y + h);
      ctx.arc(x + r, y + r, r, Math.PI / 2, -Math.PI / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = glow(color, 0.4);
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // inner highlight stripe
      ctx.beginPath();
      ctx.moveTo(x + r, y + h * 0.25);
      ctx.lineTo(x + w - r, y + h * 0.25);
      ctx.strokeStyle = glow(color, 0.12);
      ctx.lineWidth = 1;
      ctx.stroke();
      // flow chevrons inside pipe
      ctx.strokeStyle = glow(color, 0.2);
      ctx.lineWidth = 1.2;
      const chevCount = Math.floor((w - r * 2) / 30);
      for (let i = 0; i < chevCount; i++) {
        const cx = x + r + 15 + i * 30;
        const cy = y + h / 2;
        ctx.beginPath();
        ctx.moveTo(cx - 4, cy - 5);
        ctx.lineTo(cx + 4, cy);
        ctx.lineTo(cx - 4, cy + 5);
        ctx.stroke();
      }
    }

    function drawHexagon(ctx, cx, cy, r, color) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const px = cx + r * Math.cos(angle);
        const py = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = glow(color, 0.06);
      ctx.fill();
      ctx.strokeStyle = glow(color, 0.4);
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function drawChip(ctx, x, y, w, h, color) {
      // GPU/chip shape with pins
      roundRect(ctx, x, y, w, h, 6, glow(color, 0.06), glow(color, 0.4), 1.5);
      // pins on left
      const pinCount = 4;
      const pinGap = h / (pinCount + 1);
      ctx.strokeStyle = glow(color, 0.3);
      ctx.lineWidth = 2;
      for (let i = 1; i <= pinCount; i++) {
        const py = y + pinGap * i;
        ctx.beginPath(); ctx.moveTo(x - 8, py); ctx.lineTo(x, py); ctx.stroke();
      }
      // pins on right
      for (let i = 1; i <= pinCount; i++) {
        const py = y + pinGap * i;
        ctx.beginPath(); ctx.moveTo(x + w, py); ctx.lineTo(x + w + 8, py); ctx.stroke();
      }
      // pins top
      const tPinCount = Math.floor(w / 18);
      const tGap = w / (tPinCount + 1);
      for (let i = 1; i <= tPinCount; i++) {
        const px = x + tGap * i;
        ctx.beginPath(); ctx.moveTo(px, y - 8); ctx.lineTo(px, y); ctx.stroke();
      }
      // inner die
      const pad = 10;
      roundRect(ctx, x + pad, y + pad, w - pad * 2, h - pad * 2, 3, glow(color, 0.04), glow(color, 0.15), 0.8);
    }

    function drawCloud(ctx, cx, cy, w, h, color) {
      const hw = w / 2, hh = h / 2;
      ctx.beginPath();
      ctx.moveTo(cx - hw * 0.6, cy + hh * 0.5);
      ctx.bezierCurveTo(cx - hw, cy + hh * 0.5, cx - hw, cy - hh * 0.2, cx - hw * 0.5, cy - hh * 0.4);
      ctx.bezierCurveTo(cx - hw * 0.4, cy - hh, cx + hw * 0.2, cy - hh, cx + hw * 0.3, cy - hh * 0.5);
      ctx.bezierCurveTo(cx + hw * 0.7, cy - hh, cx + hw, cy - hh * 0.3, cx + hw, cy + hh * 0.1);
      ctx.bezierCurveTo(cx + hw, cy + hh * 0.5, cx + hw * 0.6, cy + hh * 0.5, cx + hw * 0.4, cy + hh * 0.5);
      ctx.lineTo(cx - hw * 0.6, cy + hh * 0.5);
      ctx.closePath();
      ctx.fillStyle = glow(color, 0.06);
      ctx.fill();
      ctx.strokeStyle = glow(color, 0.4);
      ctx.lineWidth = 1.5;

    function handleCanvasClick(e, canvas, regions) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = 1100 / rect.width;
      const scaleY = canvas.getAttribute('height') / canvas.getBoundingClientRect().height;
      // Use the logical coordinate system
      const mx = (e.clientX - rect.left) * (1100 / rect.width);
      const my = (e.clientY - rect.top) * (880 / rect.height);
      for (const r of regions) {
        if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
          openModal(r.id);
          return;
        }
      }
    }

    // MAIN LOOP
    // ═══════════════════════════════════════════════════════════
    const flowCanvas = document.getElementById('flowCanvas');
    const sysCanvas = document.getElementById('sysCanvas');

    function resizeCanvases() {
      const w = document.querySelector('.canvas-wrap').clientWidth;
      // flow
      flowCanvas.style.width = w + 'px';
      flowCanvas.style.height = (w * 880 / 1100) + 'px';
      flowCanvas.width = 1100;
      flowCanvas.height = 880;
      // sys
      sysCanvas.style.width = w + 'px';
      sysCanvas.style.height = (w * 730 / 1100) + 'px';
      sysCanvas.width = 1100;
      sysCanvas.height = 730;
    }

    resizeCanvases();
    window.addEventListener('resize', () => {
      resizeCanvases();
      drawSystemDesign(sysCanvas.getContext('2d'), 1100, 730);
    });

    flowCanvas.addEventListener('click', e => handleCanvasClick(e, flowCanvas, flowRegions));
    sysCanvas.addEventListener('click', e => handleCanvasClick(e, sysCanvas, sysRegions));

    // Cursor
    [flowCanvas, sysCanvas].forEach(c => {
      c.addEventListener('mousemove', e => {
        const rect = c.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (1100 / rect.width);
        const my = (e.clientY - rect.top) * ((c === flowCanvas ? 880 : 730) / rect.height);
        const regions = c === flowCanvas ? flowRegions : sysRegions;
        let hit = false;
        for (const r of regions) {
          if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) { hit = true; break; }
        }
        c.style.cursor = hit ? 'pointer' : 'default';
      });
    });

    // Draw system view once
    drawSystemDesign(sysCanvas.getContext('2d'), 1100, 730);

    // Animation loop
    spawnParticles();
    respawnLoop();

    function animate(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.05);
      lastTime = t;

      if (currentView === 'flow') {
        const ctx = flowCanvas.getContext('2d');
        drawFlowStatic(ctx, 1100, 880);
        particles.forEach(p => { p.update(dt); p.draw(ctx); });
      }
      requestAnimationFrame(animate);
    }
    requestAnimationFrame((t) => { lastTime = t; animate(t); });
  </script>
</body>

</html>
